<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My-Cv</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-page d-flex align-items-center justify-content-center">
    <div class="container mt-2">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card shadow-lg border-0">
                    <div class="card-body py-4 px-5">
                        <div class="text-center mb-4">
                            <div class="logo-box mx-auto mb-3">
                                <span class="logo-inner"></span>
                            </div>
                            <h2 class="login-heading font-serif">Welcome Back</h2>
                            <p class="text-muted small font-sans">Please enter your details to sign in</p>
                        </div>

                        <form>
                            <div class="mb-4">
                                <label class="form-label small fw-bold text-secondary">EMAIL ADDRESS</label>
                                <input type="email" class="form-control custom-input" placeholder="name@company.com">
                            </div>
                            <div class="mb-4">
                                <div class="d-flex justify-content-between">
                                    <label class="form-label small fw-bold text-secondary">PASSWORD</label>
                            
                                </div>
                                <input type="password" class="form-control custom-input" placeholder="••••••••">
                            </div>

                            <button type="submit" class="btn btn-primary-theme w-100 rounded-pill py-3 mb-4">
                                Sign In
                            </button>
                        </form>

                        <div class="text-center">
                            <p class="small text-muted">
                                Don't have an account? <a href="#" class="text-primary-theme fw-bold text-decoration-none">Create one</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="login-page d-flex align-items-center justify-content-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card login-card shadow-lg border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="login-heading font-serif">Create Account</h2>
                            <p class="text-muted small">Join us and start building your career story</p>
                        </div>

                        <form>
                            <div class="row mb-3">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label class="form-label small fw-bold text-secondary">FIRST NAME</label>
                                    <input type="text" class="form-control custom-input" placeholder="Maheen">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">LAST NAME</label>
                                    <input type="text" class="form-control custom-input" placeholder="Zuhra">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold text-secondary">EMAIL ADDRESS</label>
                                <input type="email" class="form-control custom-input" placeholder="name@email.com">
                            </div>

                            <div class="mb-4">
                                <label class="form-label small fw-bold text-secondary">PASSWORD</label>
                                <input type="password" class="form-control custom-input" placeholder="Create a strong password">
                                <div class="form-text small opacity-50">Must be at least 8 characters.</div>
                            </div>

                            <button type="submit" class="btn btn-primary-theme w-100 rounded-pill py-3 mb-4">
                                Create Account
                            </button>
                        </form>

                        <div class="text-center">
                            <p class="small text-muted mb-0">
                                Already have an account? <a href="#" class="text-primary-theme fw-bold text-decoration-none">Sign In</a>
                            </p>
                        </div>
                    </div>
                </div>
                
                <p class="text-center mt-4 small text-muted font-sans">
                    By signing up, you agree to our 
                    <a href="#" class="text-secondary text-decoration-underline">Terms</a> & 
                    <a href="#" class="text-secondary text-decoration-underline">Privacy</a>
                </p>
            </div>
        </div>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
