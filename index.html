<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My-Cv</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- header -->
<nav class="navbar navbar-expand-lg sticky-top custom-header">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <div class="logo-box me-2">
                <span class="logo-inner"></span>
            </div>
            <span class="logo-text">MY<span class="text-accent">CV</span></span>
        </a>

        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link px-3 fs-6" href="template.html">Templates</a>
                </li>
                <li class="nav-item ms-lg-4">
                    <a href="auth.html">
                        <button class="btn btn-outline-theme rounded-pill px-4 me-2">Login</button>
                    </a>
                </li>
                <li class="nav-item">
                    <button class="btn btn-primary-theme rounded-pill px-4">Get Started</button>
                </li>
            </ul>
        </div>
    </div>
</nav>
<!-- hero section -->
 <section class="hero-section d-flex align-items-center">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-6 mt-5 mt-lg-0">
                <div class="hero-badge mb-3">
                    <span class="badge rounded-pill shadow-sm">New: AI Resume Analysis ✨</span>
                </div>
                <h1 class="hero-title mb-4">
                    The most modern way to build your <span class="text-accent">Career.</span>
                </h1>
                <p class="hero-subtitle mb-5">
                    Create a high-impact, professional resume in minutes. No design skills needed—just your story and our premium templates.
                </p>
                <div class="hero-cta d-flex gap-3 align-items-center">
                    <button class="btn btn-primary-theme rounded-pill px-5 py-3">Build My Resume</button>
                    <button class="btn btn-link text-primary-theme fw-bold text-decoration-none">
                        View Templates <i class="bi bi-arrow-right ms-2"></i>
                    </button>
                </div>
                <div class="hero-stats mt-5 d-flex gap-4">
                    <div class="stat-item">
                        <span class="d-block fw-bold fs-4">10k+</span>
                        <span class="text-muted small">Resumes Created</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <span class="d-block fw-bold fs-4">4.9/5</span>
                        <span class="text-muted small">User Rating</span>
                    </div>
                </div>
            </div>

            <div class="col-lg-6 mt-5 mt-lg-0">
                <div class="hero-image-wrapper">
                    <img src="assets/hero.png" alt="Resume Preview" class="img-fluid hero-image">
                    
                    <div class="floating-card-1 shadow-lg"></div>
                    <div class="floating-card-2 shadow-lg"></div>
                </div>
            </div>
        </div>
    </div>
</section>
    <script src="app.js"></script>
</body>
</html>
