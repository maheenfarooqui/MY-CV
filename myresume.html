<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MYCV | Builder</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="template.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg sticky-top custom-header">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <div class="logo-box me-2"><span class="logo-inner"></span></div>
          <span class="logo-text">MY<span class="text-accent">CV</span></span>
        </a>

        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item"><a class="nav-link px-3 fs-6" href="template.html">Templates</a></li>
            <li class="nav-item ms-lg-4"><a class="btn btn-outline-theme rounded-pill px-4 me-2" href="auth.html">Login</a></li>
            <li class="nav-item"><a class="btn btn-primary-theme rounded-pill px-4" href="template.html">Change Template</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="dashboard-container">
      <aside class="input-panel custom-scrollbar">
        <h1 class="section-title">Personal Identity</h1>
        <div class="form-group">
          <label for="input-name">Full Name</label>
          <input type="text" class="custom-input" id="input-name" placeholder="Yassine Ben Salem" />
        </div>
        <div class="form-group">
          <label for="input-title">Job Title</label>
          <input type="text" class="custom-input" id="input-title" placeholder="Sales Manager" />
        </div>

        <h2 class="section-title">Contact Links</h2>
        <div class="form-group">
          <label for="input-linkedin"><i class="bi bi-linkedin"></i> LinkedIn URL</label>
          <input type="text" class="custom-input" id="input-linkedin" placeholder="linkedin.com/in/username" />
        </div>
        <div class="form-group">
          <label for="input-email"><i class="bi bi-envelope"></i> Email Address</label>
          <input type="email" class="custom-input" id="input-email" placeholder="email@example.com" />
        </div>
        <div class="form-group">
          <label for="input-phone"><i class="bi bi-telephone"></i> Phone Number</label>
          <input type="text" class="custom-input" id="input-phone" placeholder="+216 55 482 731" />
        </div>
        <div class="form-group">
          <label for="input-location"><i class="bi bi-geo-alt"></i> Location</label>
          <input type="text" class="custom-input" id="input-location" placeholder="Tunis, Tunisia" />
        </div>

        <h2 class="section-title">Professional Summary</h2>
        <div class="form-group">
          <label for="input-summary" class="visually-hidden">Professional Summary</label>
          <textarea class="custom-input" id="input-summary" rows="4" placeholder="Describe your professional background..."></textarea>
        </div>

        <h2 class="section-title">Skills</h2>
        <div id="skills-container">
          <input type="text" class="custom-input mb-2 skill-input" placeholder="e.g. Lead Generation" />
        </div>
        <button class="btn-primary-gold btn-sm mb-4 rounded-pill" type="button" data-builder-action="skill">
          <i class="bi bi-plus"></i> Add Skill
        </button>

        <h2 class="section-title">Work Experience</h2>
        <div id="experience-container" class="mb-3">
          <div class="card p-3 mb-3 bg-light border-0 shadow-sm exp-block">
            <input type="text" class="custom-input mb-2 exp-role" placeholder="Job Role (e.g. Sales Manager)" />
            <input type="text" class="custom-input mb-2 exp-company" placeholder="Company (e.g. Tunisie Connect)" />
            <input type="text" class="custom-input mb-2 exp-date" placeholder="Date & Location (e.g. Jan 2022 - Present)" />
            <textarea class="custom-input exp-desc" rows="3" placeholder="Key responsibilities (use new lines for bullets)"></textarea>
          </div>
        </div>
        <button class="btn-primary-gold btn-sm mb-4 rounded-pill" type="button" data-builder-action="experience">
          <i class="bi bi-plus"></i> Add Experience
        </button>

        <h2 class="section-title">Education</h2>
        <div class="form-group">
          <label for="input-degree" class="visually-hidden">Degree Name</label>
          <input type="text" class="custom-input mb-2" id="input-degree" placeholder="Degree Name" />
          <label for="input-education" class="visually-hidden">University and Dates</label>
          <input type="text" class="custom-input mb-2" id="input-education" placeholder="University & Dates" />
        </div>

        <h2 class="section-title">Certificates</h2>
        <div id="cert-container">
          <input type="text" class="custom-input mb-2 cert-input" placeholder="Certification Name" />
        </div>
        <button class="btn-primary-gold btn-sm mb-4 rounded-pill" type="button" data-builder-action="certificate">
          <i class="bi bi-plus"></i> Add Certificate
        </button>

        <h2 class="section-title">Languages</h2>
        <div id="languages-container">
          <input type="text" class="custom-input mb-2 lang-input" placeholder="Language" />
        </div>
        <button class="btn-primary-gold btn-sm mb-5 rounded-pill" type="button" data-builder-action="language">
          <i class="bi bi-plus"></i> Add Language
        </button>

        <div class="d-flex justify-content-center">
          <button class="btn btn-primary-theme rounded-pill px-5 py-3" type="button" data-builder-action="preview">
            <i class="bi bi-eye"></i> Live Preview
          </button>
        </div>
      </aside>

      <section class="preview-panel" aria-label="Resume preview">
        <div class="preview-sticky-wrapper">
          <div class="resume-canvas" id="live-preview">
            <div class="text-center p-5">
              <p style="color: var(--color-text-secondary)">Fill the form to see your resume live...</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
